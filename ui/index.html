<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="src/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jim and Fangzhuo</title>
</head>

<body>
  <div id="app">
    <form id="login" hidden="true">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.8" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </div>
        </div>

        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required
            autocomplete="username" />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required
            autocomplete="current-password" />
        </div>

        <div id="login-error" class="login-error-msg" hidden></div>

        <button type="submit" id="login-btn">
          <span class="btn-text">Login</span>
          <div class="btn-loader" hidden></div>
        </button>
      </div>
    </form>

    <div id="modal" hidden="true">
      <div id="modal-content">
        <button id="modal-live-btn" class="modal-live-btn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="live-icon">
            <circle cx="12" cy="12" r="10" stroke-dasharray="3 3"></circle>
            <circle cx="12" cy="12" r="6"></circle>
            <circle cx="12" cy="12" r="2" fill="currentColor"></circle>
          </svg>
          <span>LIVE</span>
        </button>
        <a id="modal-download-btn" class="modal-download-btn" href="" download target="_blank" title="Download Original">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="download-icon">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </a>
        <img id="modal-image" src="" alt="" hidden>
        <video id="modal-video" src="" controls autoplay playsinline loop hidden></video>
      </div>
    </div>

    <div id="main" hidden="true">
      <header class="nav-bar">
        <button id="home-btn" hidden="true">Home</button>
        <button id="logout">Logout</button>
      </header>
      <div id="album-container"></div>
      <div id="images-container"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
