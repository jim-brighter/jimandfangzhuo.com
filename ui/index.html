<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" type="text/css" href="src/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jim and Fangzhuo</title>
</head>

<body>
  <div id="app">
    <form id="login" hidden="true">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </div>
        </div>

        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" />
        </div>

        <div id="login-error" class="login-error-msg" hidden></div>

        <button type="submit" id="login-btn">
          <span class="btn-text">Login</span>
          <div class="btn-loader" hidden></div>
        </button>
      </div>
    </form>
    <div id="main" hidden="true">
      <header class="nav-bar">
        <button id="home-btn" hidden="true">Home</button>
        <button id="logout">Logout</button>
      </header>
      <div id="album-container"></div>
      <div id="images-container"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
